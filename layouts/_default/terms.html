{{- /* taxonomy terms landing (e.g. /tags/, /categories/) as a cloud */ -}}
{{- define "content" -}}
  <div class="terms">
    <h1 class="list-title">{{ .Title | lower }}</h1>
    {{- with .Content }}<div class="content">{{ . }}</div>{{ end -}}
    <div class="tag-cloud">
      {{- range .Data.Terms.ByCount -}}
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title | lower }} <span class="tag-count">{{ .Count }}</span></a>
      {{- end -}}
    </div>
  </div>
{{- end -}}
