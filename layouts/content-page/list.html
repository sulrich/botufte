{{- /* type: "content-page" — render a section's _index.md as a single page,
      no child listing (e.g. /misc/). */ -}}
{{- define "content" -}}
  <article class="single">
    <h1 class="single-title">{{ .Title }}</h1>
    <div class="content" id="content">{{ .Content }}</div>
  </article>
{{- end -}}
